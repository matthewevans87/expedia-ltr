data:
  processed_dir: "data/processed/v1"
  group_col: "srch_id"
  position_col: "position"
  label_col: "click_bool" #primary label
  booking_col: "booking_bool" #secondary
  feature_cols:
    query_level:
      - "site_id"
      - "visitor_location_country_id"
      - "srch_length_of_stay"
      - "srch_booking_window"
      - "srch_adults_count"
      - "srch_children_count"
      - "srch_room_count"
    item_level:
      - "prop_country_id"
      - "prop_starrating"
      - "prop_review_score"
      - "prop_brand_bool"
      - "prop_location_score1"
      - "prop_location_score2"
      - "prop_log_historical_price"
    interaction_level:
      - "price_usd"
      - "promotion_flag"
  non_display_positions: [5, 11, 17, 23, 37, 38, 39, 40]

lgbm:
  objective: "lambdarank"
  metric: "ndcg"
  ndcg_eval_at: [1, 5, 10]
  num_leaves: 63
  learning_rate: 0.05
  n_estimators: 500
  early_stopping_rounds: 30
  label_gain: [0, 1, 5] #note that this is mapped to labels 0=no interaction, 1=clicked, 2=booked
  seed: 42

eval:
  k_values: [1, 5, 10]

output_dir: "runs/lgbm_sweep"